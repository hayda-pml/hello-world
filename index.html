<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #f8f8f8;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #050339 0%, #1a1a4d 100%);
            color: white;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(5, 3, 57, 0.15);
            border-bottom: 3px solid #FFB800;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        button {
            background: linear-gradient(135deg, #FFB800 0%, #ff9500 100%);
            color: #050339;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(255, 184, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 184, 0, 0.3);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .quadrant {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            min-height: 450px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .quadrant:hover {
            box-shadow: 0 8px 24px rgba(5, 3, 57, 0.12);
            border-color: #FFB800;
        }

        .quadrant-header {
            padding: 20px;
            background: linear-gradient(135deg, #f8f8f8 0%, #f0f0f0 100%);
            border-bottom: 2px solid #FFB800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quadrant-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #050339;
        }

        .quadrant-count {
            background: linear-gradient(135deg, #050339 0%, #1a1a4d 100%);
            color: #FFB800;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            min-width: 40px;
            text-align: center;
        }

        .quadrant-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 14px;
            align-content: flex-start;
        }

        .quadrant-content::-webkit-scrollbar {
            width: 6px;
        }

        .quadrant-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .quadrant-content::-webkit-scrollbar-thumb {
            background: #FFB800;
            border-radius: 3px;
        }

        .project-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 16px;
            cursor: move;
            transition: all 0.2s ease;
            position: relative;
            user-select: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            border-left: 4px solid #FFB800;
        }

        .project-card.dragging {
            opacity: 0.8;
            box-shadow: 0 12px 24px rgba(5, 3, 57, 0.2);
            transform: scale(1.02);
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(5, 3, 57, 0.12);
            border-color: #050339;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }

        .card-title {
            font-weight: 600;
            font-size: 13px;
            line-height: 1.4;
            flex: 1;
            color: #050339;
        }

        .card-industry {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
        }

        .industry-tech { background: #e3f2fd; border-color: #1976d2; }
        .industry-finance { background: #f3e5f5; border-color: #7b1fa2; }
        .industry-healthcare { background: #e8f5e9; border-color: #388e3c; }
        .industry-retail { background: #fff3e0; border-color: #f57c00; }
        .industry-manufacturing { background: #fce4ec; border-color: #c2185b; }
        .industry-energy { background: #e0f2f1; border-color: #00796b; }

        .card-details {
            font-size: 12px;
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
            padding: 10px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #666;
        }

        .detail-label {
            font-weight: 500;
            color: #999;
        }

        .detail-value {
            font-weight: 700;
            color: #050339;
        }

        .volume-value {
            color: #FFB800;
            font-weight: 700;
        }

        .chance-value {
            color: #0066cc;
            font-weight: 700;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .people-badge {
            background: linear-gradient(135deg, #050339 0%, #1a1a4d 100%);
            color: #FFB800;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .card-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            padding: 6px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .card-btn:hover {
            background: rgba(255, 184, 0, 0.1);
            color: #FFB800;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(5, 3, 57, 0.3);
            animation: slideIn 0.3s ease;
            border-top: 4px solid #FFB800;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #050339;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #ccc;
            padding: 0;
            box-shadow: none;
        }

        .close-btn:hover {
            color: #FFB800;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #050339;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: #f8f8f8;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #FFB800;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 184, 0, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #050339 0%, #1a1a4d 100%);
            color: #FFB800;
            flex: 1;
            box-shadow: 0 4px 12px rgba(5, 3, 57, 0.2);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(5, 3, 57, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            box-shadow: none;
        }

        .stats-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8e8e8;
            border-top: 4px solid #FFB800;
        }

        .stat-card {
            padding: 20px;
            border-radius: 10px;
            background: linear-gradient(135deg, #050339 0%, #1a1a4d 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 184, 0, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .stat-label {
            font-size: 12px;
            color: #FFB800;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: white;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .quadrant-content {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (max-width: 600px) {
            .header-content {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            h1 {
                font-size: 24px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }

            .main-container {
                padding: 16px;
            }

            .dashboard-grid {
                gap: 16px;
            }

            .quadrant-content {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 24px;
            }

            .stats-container {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #ccc;
            text-align: center;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 40px;
            margin-bottom: 12px;
            color: #ddd;
        }

        .empty-state p {
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>📊 Projekt Dashboard</h1>
            <div class="header-actions">
                <button onclick="openModal()">
                    <i class="fas fa-plus"></i> Neues Projekt
                </button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Gesamt Projekte</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Durchschnittliche Chance</div>
                <div class="stat-value" id="statChance">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Gesamtes Volumen</div>
                <div class="stat-value" id="statVolume">€0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Beteiligte Personen</div>
                <div class="stat-value" id="statPeople">0</div>
            </div>
        </div>

        <div style="margin-top: 32px;">
            <div class="dashboard-grid">
                <div class="quadrant" data-quadrant="0">
                    <div class="quadrant-header">
                        <div class="quadrant-title">
                            <i class="fas fa-lightbulb" style="color: #f57c00;"></i>
                            Idea & Chance
                        </div>
                        <div class="quadrant-count" id="count-0">0</div>
                    </div>
                    <div class="quadrant-content" id="quadrant-0"></div>
                </div>

                <div class="quadrant" data-quadrant="1">
                    <div class="quadrant-header">
                        <div class="quadrant-title">
                            <i class="fas fa-handshake" style="color: #1976d2;"></i>
                            Angebot
                        </div>
                        <div class="quadrant-count" id="count-1">0</div>
                    </div>
                    <div class="quadrant-content" id="quadrant-1"></div>
                </div>

                <div class="quadrant" data-quadrant="2">
                    <div class="quadrant-header">
                        <div class="quadrant-title">
                            <i class="fas fa-briefcase" style="color: #388e3c;"></i>
                            In Bearbeitung
                        </div>
                        <div class="quadrant-count" id="count-2">0</div>
                    </div>
                    <div class="quadrant-content" id="quadrant-2"></div>
                </div>

                <div class="quadrant" data-quadrant="3">
                    <div class="quadrant-header">
                        <div class="quadrant-title">
                            <i class="fas fa-check-circle" style="color: #2e7d32;"></i>
                            Abgeschlossen
                        </div>
                        <div class="quadrant-count" id="count-3">0</div>
                    </div>
                    <div class="quadrant-content" id="quadrant-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal für neues Projekt -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>Neues Projekt</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="projectForm">
                <div class="form-group">
                    <label>Projektname</label>
                    <input type="text" id="projectName" required placeholder="z.B. ERP System Implementierung">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Volumen (€)</label>
                        <input type="number" id="projectVolume" required placeholder="50000">
                    </div>
                    <div class="form-group">
                        <label>Chance (%)</label>
                        <input type="number" id="projectChance" min="0" max="100" required placeholder="75">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Personen</label>
                        <input type="number" id="projectPeople" min="1" required placeholder="5">
                    </div>
                    <div class="form-group">
                        <label>Branche</label>
                        <select id="projectIndustry" required>
                            <option value="">-- Wählen Sie --</option>
                            <option value="tech">💻 Technologie</option>
                            <option value="finance">💰 Finanzen</option>
                            <option value="healthcare">🏥 Gesundheitswesen</option>
                            <option value="retail">🛍️ Einzelhandel</option>
                            <option value="manufacturing">🏭 Fertigung</option>
                            <option value="energy">⚡ Energie</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="projectStatus" required>
                        <option value="0">Idea & Chance</option>
                        <option value="1">Angebot</option>
                        <option value="2">In Bearbeitung</option>
                        <option value="3">Abgeschlossen</option>
                    </select>
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Abbrechen</button>
                    <button type="submit" class="btn-primary">Projekt erstellen</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Datenstruktur für Projekte
        let projects = JSON.parse(localStorage.getItem('projects')) || [];

        const industryIcons = {
            tech: '💻',
            finance: '💰',
            healthcare: '🏥',
            retail: '🛍️',
            manufacturing: '🏭',
            energy: '⚡'
        };

        const industryClasses = {
            tech: 'industry-tech',
            finance: 'industry-finance',
            healthcare: 'industry-healthcare',
            retail: 'industry-retail',
            manufacturing: 'industry-manufacturing',
            energy: 'industry-energy'
        };

        const statusNames = ['Idea & Chance', 'Angebot', 'In Bearbeitung', 'Abgeschlossen'];

        let draggedCard = null;
        let draggedIndex = null;

        // Modal-Funktionen
        function openModal() {
            document.getElementById('projectModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('show');
            document.getElementById('projectForm').reset();
        }

        window.onclick = function(event) {
            const modal = document.getElementById('projectModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Formular absenden
        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const newProject = {
                id: Date.now(),
                name: document.getElementById('projectName').value,
                volume: parseInt(document.getElementById('projectVolume').value),
                chance: parseInt(document.getElementById('projectChance').value),
                people: parseInt(document.getElementById('projectPeople').value),
                industry: document.getElementById('projectIndustry').value,
                status: parseInt(document.getElementById('projectStatus').value)
            };

            projects.push(newProject);
            saveProjects();
            renderDashboard();
            closeModal();
        });

        // Projekte speichern
        function saveProjects() {
            localStorage.setItem('projects', JSON.stringify(projects));
        }

        // Projekt löschen
        function deleteProject(index) {
            if (confirm('Sind Sie sicher, dass Sie dieses Projekt löschen möchten?')) {
                projects.splice(index, 1);
                saveProjects();
                renderDashboard();
            }
        }

        // Drag-and-Drop funktionen
        function startDrag(e, index) {
            draggedCard = e.target.closest('.project-card');
            draggedIndex = index;
            draggedCard.classList.add('dragging');
        }

        function endDrag() {
            if (draggedCard) {
                draggedCard.classList.remove('dragging');
                draggedCard = null;
                draggedIndex = null;
            }
        }

        function allowDrop(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function onDrop(e, quadrantId) {
            e.preventDefault();
            if (draggedIndex !== null) {
                projects[draggedIndex].status = quadrantId;
                saveProjects();
                renderDashboard();
            }
            endDrag();
        }

        // Karte rendern
        function renderCard(project, index) {
            const industry = project.industry;
            const industryClass = industryClasses[industry] || 'industry-tech';
            const icon = industryIcons[industry] || '💼';

            return `
                <div class="project-card" draggable="true" 
                     ondragstart="startDrag(event, ${index})" 
                     ondragend="endDrag()">
                    <div class="card-header">
                        <div class="card-title">${project.name}</div>
                        <div class="card-industry ${industryClass}">${icon}</div>
                    </div>
                    <div class="card-details">
                        <div class="detail-row">
                            <span class="detail-label">Volumen:</span>
                            <span class="detail-value volume-value">€${project.volume.toLocaleString('de-DE')}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Chance:</span>
                            <span class="detail-value chance-value">${project.chance}%</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="people-badge">
                            <i class="fas fa-users"></i> ${project.people}
                        </div>
                        <div class="card-actions">
                            <button class="card-btn" onclick="deleteProject(${index})" title="Löschen">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Dashboard rendern
        function renderDashboard() {
            // Quadranten leeren
            for (let i = 0; i < 4; i++) {
                document.getElementById(`quadrant-${i}`).innerHTML = '';
            }

            // Projekte nach Status gruppieren
            const grouped = [[], [], [], []];
            projects.forEach((project, index) => {
                grouped[project.status].push({ ...project, originalIndex: index });
            });

            // Projekte in Quadranten rendern
            grouped.forEach((group, quadrantId) => {
                const quadrantContent = document.getElementById(`quadrant-${quadrantId}`);
                
                if (group.length === 0) {
                    quadrantContent.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>Keine Projekte</p>
                        </div>
                    `;
                } else {
                    group.forEach(project => {
                        const html = renderCard(project, project.originalIndex);
                        const div = document.createElement('div');
                        div.innerHTML = html;
                        quadrantContent.appendChild(div.firstElementChild);
                    });
                }

                // Counter aktualisieren
                document.getElementById(`count-${quadrantId}`).textContent = group.length;

                // Drag-and-drop Zone
                quadrantContent.addEventListener('dragover', allowDrop);
                quadrantContent.addEventListener('drop', (e) => onDrop(e, quadrantId));
            });

            // Statistiken aktualisieren
            updateStats();
        }

        // Statistiken aktualisieren
        function updateStats() {
            const total = projects.length;
            const avgChance = total > 0 ? Math.round(projects.reduce((sum, p) => sum + p.chance, 0) / total) : 0;
            const totalVolume = projects.reduce((sum, p) => sum + p.volume, 0);
            const totalPeople = projects.reduce((sum, p) => sum + p.people, 0);

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statChance').textContent = avgChance + '%';
            document.getElementById('statVolume').textContent = '€' + totalVolume.toLocaleString('de-DE');
            document.getElementById('statPeople').textContent = totalPeople;
        }

        // Initial rendern
        renderDashboard();
